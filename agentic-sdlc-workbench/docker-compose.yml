version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: asdlc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: asdlc
      POSTGRES_USER: asdlc_app
      POSTGRES_PASSWORD: asdlc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asdlc_app -d asdlc"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
